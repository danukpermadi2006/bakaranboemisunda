<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rekap Kasir Resto Pro</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel for inline JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        .animate-fade-in {
            animation: fadeIn 0.2s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-slate-100 font-sans text-slate-800 antialiased min-h-screen flex justify-center items-center p-0 sm:p-4">
    <div id="root" class="w-full max-w-md"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const MENU_ITEMS = [
          "Kuning DADA", "Kuning PAHA", "Kalasan DADA", "Kalasan PAHA",
          "Lele", "Gurame", "Nila", "Sate Ayam", "Sate Kambing",
          "Iga Bakar", "Bumbu Bakaran", "Kecap Koki", "Bandeng", "Bebek"
        ];

        // SVGs replacing lucide icons for bulletproof CDN deployment
        const Icons = {
            Save: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>,
            Copy: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>,
            Trash2: () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>,
            Plus: () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></svg>,
            Minus: () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"></svg>,
            Receipt: ({ size = 18 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 2v20l2-1 2 1 2-1 2 1 2-1 2 1 2-1 2 1V2l-2 1-2-1-2 1-2-1-2 1-2-1-2 1-2-1z"></path><path d="M16 8H8"></path><path d="M16 12H8"></path><path d="M13 16H8"></path></svg>,
            CheckCircle2: ({ size = 12 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"></path><path d="m9 12 2 2 4-4"></path></svg>,
            AlertCircle: ({ size = 22 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>,
            FileText: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line></svg>,
            ClipboardList: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path><rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect><line x1="9" y1="12" x2="10" y2="12"></line><line x1="14" y1="12" x2="15" y2="12"></line><line x1="9" y1="16" x2="10" y2="16"></line><line x1="14" y1="16" x2="15" y2="16"></line></svg>,
            RotateCcw: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></svg>
        };

        function App() {
          const [currentReceipt, setCurrentReceipt] = useState(() => {
            const saved = localStorage.getItem('resto_currentReceipt');
            return saved ? JSON.parse(saved) : {};
          });
          
          const [grandTotal, setGrandTotal] = useState(() => {
            const saved = localStorage.getItem('resto_grandTotal');
            return saved ? JSON.parse(saved) : {};
          });
          
          const [receiptCount, setReceiptCount] = useState(() => {
            const saved = localStorage.getItem('resto_receiptCount');
            return saved ? JSON.parse(saved) : 0;
          });

          const [activeTab, setActiveTab] = useState('input');
          const [copied, setCopied] = useState(false);
          const [showResetModal, setShowResetModal] = useState(false);
          const [showToast, setShowToast] = useState({ show: false, message: '' });

          useEffect(() => {
            localStorage.setItem('resto_currentReceipt', JSON.stringify(currentReceipt));
          }, [currentReceipt]);

          useEffect(() => {
            localStorage.setItem('resto_grandTotal', JSON.stringify(grandTotal));
          }, [grandTotal]);

          useEffect(() => {
            localStorage.setItem('resto_receiptCount', JSON.stringify(receiptCount));
          }, [receiptCount]);

          const triggerToast = (message) => {
            setShowToast({ show: true, message });
            setTimeout(() => setShowToast({ show: false, message: '' }), 3000);
          };

          const addToCurrent = (item) => {
            setCurrentReceipt(prev => ({
              ...prev,
              [item]: (prev[item] || 0) + 1
            }));
          };

          const updateCurrentQuantity = (item, delta) => {
            setCurrentReceipt(prev => {
              const newQuantity = (prev[item] || 0) + delta;
              if (newQuantity <= 0) {
                const newState = { ...prev };
                delete newState[item];
                return newState;
              }
              return { ...prev, [item]: newQuantity };
            });
          };

          const getTotalItemsInCurrent = () => {
            return Object.values(currentReceipt).reduce((a, b) => a + b, 0);
          };

          const saveReceipt = () => {
            if (Object.keys(currentReceipt).length === 0) return;

            setGrandTotal(prev => {
              const newTotal = { ...prev };
              Object.keys(currentReceipt).forEach(item => {
                newTotal[item] = (newTotal[item] || 0) + currentReceipt[item];
              });
              return newTotal;
            });

            setReceiptCount(prev => prev + 1);
            setCurrentReceipt({});
            triggerToast("✅ Struk berhasil disimpan!");
          };

          const clearCurrentReceipt = () => {
            setCurrentReceipt({});
            triggerToast("🗑️ Input struk dikosongkan");
          };

          const handleCopy = () => {
            if (Object.keys(grandTotal).length === 0) {
              triggerToast("⚠️ Belum ada data untuk disalin!");
              return;
            }

            let textToCopy = `*REKAP PENJUALAN*\n`;
            textToCopy += `Total Struk: ${receiptCount}\n`;
            textToCopy += `---------------------\n`;
            
            MENU_ITEMS.forEach(item => {
              if (grandTotal[item]) {
                textToCopy += `${item}: ${grandTotal[item]}\n`;
              }
            });

            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(textToCopy).then(() => {
                    setCopied(true);
                    triggerToast("✅ Laporan disalin ke WA!");
                    setTimeout(() => setCopied(false), 2000);
                }).catch(() => {
                    fallbackCopy(textToCopy);
                });
            } else {
                fallbackCopy(textToCopy);
            }
          };

          const fallbackCopy = (text) => {
            const VictoriaSecret = document.createElement("textarea");
            VictoriaSecret.value = text;
            VictoriaSecret.style.position = "fixed";
            document.body.appendChild(VictoriaSecret);
            VictoriaSecret.select();
            try {
              document.execCommand('copy');
              setCopied(true);
              triggerToast("✅ Laporan disalin!");
              setTimeout(() => setCopied(false), 2000);
            } catch (err) {
              triggerToast("❌ Gagal menyalin teks.");
            }
            document.body.removeChild(VictoriaSecret);
          };

          const confirmReset = () => {
            setCurrentReceipt({});
            setGrandTotal({});
            setReceiptCount(0);
            localStorage.removeItem('resto_currentReceipt');
            localStorage.removeItem('resto_grandTotal');
            localStorage.removeItem('resto_receiptCount');
            setShowResetModal(false);
            triggerToast("🔄 Semua data telah direset");
            setActiveTab('input');
          };

          return (
            <div className="min-h-screen bg-slate-50 pb-24 relative shadow-xl border-x border-slate-200/50 bg-white flex flex-col">
              {showToast.show && (
                <div className="fixed top-6 left-1/2 transform -translate-x-1/2 z-50 bg-slate-900/95 text-white px-5 py-2.5 rounded-full shadow-xl text-xs font-semibold backdrop-blur-sm tracking-wide border border-slate-700/50 animate-fade-in">
                  {showToast.message}
                </div>
              )}

              {/* Header */}
              <div className="bg-white/80 backdrop-blur-md px-4 py-4 sticky top-0 z-30 border-b border-slate-100 flex justify-between items-center">
                <div>
                  <h1 className="text-base font-bold text-slate-900 tracking-tight flex items-center gap-1.5">
                    Kasir Rekap Pro
                    <span className="flex h-2 w-2 relative">
                      <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                      <span className="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                    </span>
                  </h1>
                  <p className="text-[11px] text-emerald-600 font-medium flex items-center gap-1 mt-0.5">
                    <Icons.CheckCircle2 size={10} /> Penyimpanan Lokal Aktif
                  </p>
                </div>
                <div className="bg-gradient-to-br from-indigo-50 to-indigo-100/50 border border-indigo-100 px-3.5 py-1.5 rounded-2xl flex flex-col items-center min-w-[75px] shadow-sm">
                  <span className="text-[9px] text-indigo-600 font-bold uppercase tracking-wider">Total Struk</span>
                  <span className="text-xl font-black text-indigo-700 leading-none mt-0.5">{receiptCount}</span>
                </div>
              </div>

              {/* TAB 1: INPUT STRUK */}
              {activeTab === 'input' && (
                <div className="p-4 space-y-4 flex-grow animate-fade-in">
                  <div className="bg-slate-50 p-3 rounded-2xl border border-slate-200/60">
                    <h2 className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3 px-1">Pilih Menu di Struk</h2>
                    <div className="grid grid-cols-2 gap-2">
                      {MENU_ITEMS.map((item) => {
                        const count = currentReceipt[item] || 0;
                        return (
                          <button
                            key={item}
                            onClick={() => addToCurrent(item)}
                            className={`active:scale-[0.96] transition-all duration-150 border text-left py-3.5 px-3 rounded-xl shadow-sm flex items-center justify-between group relative overflow-hidden ${
                              count > 0 
                                ? 'bg-indigo-50/90 border-indigo-200 text-indigo-900 font-bold shadow-indigo-50' 
                                : 'bg-white border-slate-200 text-slate-700 font-medium hover:border-slate-300'
                            }`}
                          >
                            <span className="text-xs truncate pr-1 z-10">{item}</span>
                            <span className={`text-[10px] px-1.5 py-0.5 rounded-md font-bold transition-all z-10 flex items-center justify-center ${
                              count > 0 
                                ? 'bg-indigo-600 text-white shadow-sm' 
                                : 'text-slate-400 group-hover:text-slate-600 bg-slate-100'
                            }`}>
                              {count > 0 ? `+${count}` : <Icons.Plus />}
                            </span>
                          </button>
                        );
                      })}
                    </div>
                  </div>

                  {/* Review Struk */}
                  <div className="bg-amber-50/40 p-4 rounded-2xl border border-dashed border-amber-200/80 relative overflow-hidden shadow-sm">
                    <div className="absolute top-0 left-0 right-0 h-1 bg-gradient-to-r from-amber-200 via-amber-300 to-amber-200 opacity-40"></div>
                    <div className="flex justify-between items-center mb-3.5">
                      <h2 className="text-xs font-bold text-amber-900/80 flex items-center gap-1.5 tracking-wide uppercase">
                        <Icons.Receipt size={14} /> Isi Struk Saat Ini
                      </h2>
                      {Object.keys(currentReceipt).length > 0 && (
                        <button onClick={clearCurrentReceipt} className="text-red-600 text-[10px] font-bold bg-red-50 hover:bg-red-100/80 px-2.5 py-1 rounded-lg border border-red-100 transition-colors">
                          KOSONGKAN
                        </button>
                      )}
                    </div>

                    {Object.keys(currentReceipt).length === 0 ? (
                      <div className="py-8 text-center text-amber-700/60 text-xs font-medium bg-white/60 rounded-xl border border-amber-100/50">
                        Belum ada menu yang diklik untuk struk ini.
                      </div>
                    ) : (
                      <div className="space-y-3">
                        <ul className="space-y-2 max-h-[25vh] overflow-y-auto pr-1">
                          {Object.keys(currentReceipt).map(item => (
                            <li key={`current-${item}`} className="flex justify-between items-center bg-white p-2.5 rounded-xl border border-amber-100 shadow-sm animate-fade-in">
                              <span className="font-semibold text-slate-800 text-xs">{item}</span>
                              <div className="flex items-center gap-2">
                                <button 
                                  onClick={() => updateCurrentQuantity(item, -1)}
                                  className="bg-slate-100 text-slate-600 w-7 h-7 rounded-lg flex items-center justify-center active:bg-slate-200 transition-colors"
                                >
                                  <Icons.Minus />
                                </button>
                                <span className="font-bold text-sm w-5 text-center text-slate-900">{currentReceipt[item]}</span>
                                <button 
                                  onClick={() => updateCurrentQuantity(item, 1)}
                                  className="bg-indigo-50 text-indigo-600 w-7 h-7 rounded-lg flex items-center justify-center active:bg-indigo-100 transition-colors"
                                >
                                  <Icons.Plus />
                                </button>
                              </div>
                            </li>
                          ))}
                        </ul>
                        
                        <button 
                          onClick={saveReceipt}
                          className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3.5 rounded-xl shadow-md shadow-indigo-100 flex items-center justify-center gap-2 text-sm transition-all active:scale-[0.98] mt-2"
                        >
                          <Icons.Save />
                          SIMPAN STRUK INI ({getTotalItemsInCurrent()} Item)
                        </button>
                      </div>
                    )}
                  </div>
                </div>
              )}

              {/* TAB 2: REKAP AKHIR */}
              {activeTab === 'rekap' && (
                <div className="p-4 space-y-4 flex flex-col flex-grow animate-fade-in">
                  <div className="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm flex-grow">
                    <h2 className="text-xs font-bold mb-4 text-slate-800 flex items-center gap-2 border-b border-slate-100 pb-3 uppercase tracking-wider">
                      <Icons.ClipboardList /> Total Akumulasi Rekap
                    </h2>
                    
                    {Object.keys(grandTotal).length === 0 ? (
                      <div className="py-16 flex flex-col items-center justify-center text-slate-400 bg-slate-50/50 rounded-xl border border-slate-100">
                        <Icons.AlertCircle size={36} />
                        <p className="text-xs font-medium mt-2">Belum ada struk yang tersimpan hari ini</p>
                      </div>
                    ) : (
                       <ul className="space-y-2.5">
                        {MENU_ITEMS.map((item) => {
                          if (!grandTotal[item]) return null;
                          return (
                            <li key={`total-${item}`} className="flex justify-between items-center py-2.5 border-b border-dashed border-slate-100 last:border-0">
                              <span className="text-slate-600 text-xs font-medium">{item}</span>
                              <span className="font-bold text-xs text-slate-900 bg-slate-100 px-3 py-1 rounded-full">{grandTotal[item]} porsi</span>
                            </li>
                          );
                        })}
                      </ul>
                    )}
                  </div>

                  <div className="space-y-2.5 pt-2">
                    <button
                      onClick={handleCopy}
                      className={`w-full py-3.5 rounded-xl font-bold flex items-center justify-center gap-2 text-sm transition-all active:scale-[0.98] text-white shadow-md ${
                        copied ? 'bg-emerald-500 shadow-emerald-100' : 'bg-slate-900 shadow-slate-200'
                      }`}
                    >
                      {copied ? <Icons.CheckCircle2 size={16} /> : <Icons.Copy />}
                      {copied ? 'Berhasil Tersalin!' : 'Salin Laporan WhatsApp'}
                    </button>
                    
                    <button
                      onClick={() => setShowResetModal(true)}
                      className="w-full py-3 text-red-600 bg-red-50 hover:bg-red-100/50 active:bg-red-100 rounded-xl font-bold text-xs flex items-center justify-center gap-1.5 transition-colors border border-red-100/40"
                    >
                      <Icons.RotateCcw /> Reset & Tutup Shift Hari Ini
                    </button>
                  </div>
                </div>
              )}

              {/* Bottom Tab Bar */}
              <div className="absolute bottom-0 left-0 right-0 bg-white/80 backdrop-blur-md border-t border-slate-100 shadow-[0_-4px_12px_-2px_rgba(0,0,0,0.03)] z-40">
                <div className="flex h-16">
                  <button 
                    onClick={() => setActiveTab('input')}
                    className={`flex-1 flex flex-col items-center justify-center gap-1 transition-colors ${activeTab === 'input' ? 'text-indigo-600 font-bold' : 'text-slate-400 font-medium'}`}
                  >
                    <Icons.FileText />
                    <span className="text-[10px] tracking-wide uppercase">Input Struk</span>
                  </button>
                  <button 
                    onClick={() => setActiveTab('rekap')}
                    className={`flex-1 flex flex-col items-center justify-center gap-1 transition-colors ${activeTab === 'rekap' ? 'text-indigo-600 font-bold' : 'text-slate-400 font-medium'}`}
                  >
                    <Icons.ClipboardList />
                    <span className="text-[10px] tracking-wide uppercase">Rekap Akhir</span>
                  </button>
                </div>
              </div>

              {/* Reset Modal */}
              {showResetModal && (
                <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 animate-fade-in">
                  <div className="bg-white rounded-3xl p-5 w-full max-w-xs shadow-2xl border border-slate-100">
                     <div className="w-11 h-11 rounded-2xl bg-red-50 text-red-600 flex items-center justify-center mb-3.5 mx-auto border border-red-100">
                       <Icons.AlertCircle size={20} />
                     </div>
                     <h3 className="text-sm font-bold text-slate-900 mb-1.5 text-center">Reset & Mulai Baru?</h3>
                     <p className="text-slate-500 text-xs text-center mb-5 leading-relaxed">
                       Semua rekapan porsi dan hitungan jumlah struk akan dikosongkan kembali ke 0. Pastikan laporan sudah dikirim!
                     </p>
                     <div className="flex gap-2.5">
                       <button 
                         onClick={() => setShowResetModal(false)} 
                         className="flex-1 py-2.5 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-xl font-bold text-xs transition-colors"
                       >
                         Batal
                       </button>
                       <button 
                         onClick={confirmReset} 
                         className="flex-1 py-2.5 bg-red-600 hover:bg-red-700 text-white rounded-xl font-bold text-xs shadow-md shadow-red-100 transition-colors"
                       >
                         Ya, Kosongkan
                       </button>
                     </div>
                  </div>
                </div>
              )}
            </div>
          );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
