<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rekap Kasir Resto Pro</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Alpine.js (Lightweight framework anti-white-screen) -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        body { -webkit-tap-highlight-color: transparent; }
        .animate-fade-in { animation: fadeIn 0.2s ease-out forwards; }
        .animate-slide-up { animation: slideUp 0.3s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* Custom Scrollbar for compact view */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="bg-slate-100 font-sans text-slate-800 antialiased min-h-screen flex justify-center items-start sm:items-center sm:p-4 selection:bg-indigo-100"
      x-data="kasirApp()">

    <!-- Main Mobile Container -->
    <div class="w-full max-w-md bg-white min-h-[100dvh] sm:min-h-[850px] flex flex-col relative shadow-2xl sm:rounded-3xl sm:overflow-hidden sm:border sm:border-slate-200">
        
        <!-- Toast Notification -->
        <div x-show="toast.show" 
             x-transition:enter="transition ease-out duration-300"
             x-transition:enter-start="opacity-0 transform -translate-y-4"
             x-transition:enter-end="opacity-100 transform translate-y-0"
             x-transition:leave="transition ease-in duration-200"
             x-transition:leave-start="opacity-100 transform translate-y-0"
             x-transition:leave-end="opacity-0 transform -translate-y-4"
             class="fixed top-6 left-1/2 transform -translate-x-1/2 z-50 px-5 py-3 rounded-full shadow-xl text-xs font-semibold backdrop-blur-md tracking-wide border flex items-center gap-2"
             :class="toast.type === 'error' ? 'bg-red-50/95 text-red-700 border-red-200 shadow-red-100' : 'bg-slate-900/95 text-white border-slate-700/50 shadow-slate-200'"
             style="display: none;">
             <i :data-lucide="toast.type === 'error' ? 'alert-circle' : 'check-circle-2'" class="w-4 h-4"></i>
             <span x-text="toast.message"></span>
        </div>

        <!-- Header -->
        <header class="bg-white/80 backdrop-blur-md px-5 py-4 sticky top-0 z-30 border-b border-slate-100 flex justify-between items-center shadow-sm">
            <div>
                <h1 class="text-base font-bold text-slate-900 tracking-tight flex items-center gap-2">
                    Kasir Rekap Pro
                    <span class="flex h-2 w-2 relative">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                    </span>
                </h1>
                <p class="text-[11px] text-emerald-600 font-medium flex items-center gap-1 mt-0.5">
                    <i data-lucide="check-circle-2" class="w-3 h-3"></i> Auto-Save Aktif
                </p>
            </div>
            <div class="bg-gradient-to-br from-indigo-50 to-indigo-100/50 border border-indigo-100 px-4 py-1.5 rounded-2xl flex flex-col items-center min-w-[75px] shadow-inner">
                <span class="text-[9px] text-indigo-600 font-bold uppercase tracking-wider">Total Struk</span>
                <span class="text-xl font-black text-indigo-700 leading-none mt-0.5" x-text="receiptCount"></span>
            </div>
        </header>

        <!-- === TAB 1: INPUT STRUK === -->
        <main x-show="activeTab === 'input'" class="flex-1 flex flex-col p-4 pb-24 overflow-y-auto animate-fade-in bg-slate-50/50">
            
            <!-- Area Tombol Menu -->
            <section class="bg-white p-3.5 rounded-2xl border border-slate-200/60 shadow-sm mb-4">
                <div class="flex justify-between items-center mb-3 px-1">
                    <h2 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Pilih Menu di Struk</h2>
                    <span class="text-[10px] bg-indigo-50 text-indigo-600 px-2 py-0.5 rounded font-medium">Klik untuk tambah</span>
                </div>
                
                <div class="grid grid-cols-2 gap-2.5">
                    <template x-for="item in menuItems" :key="item">
                        <button @click="addToCurrent(item)"
                                class="active:scale-[0.96] transition-all duration-150 border text-left py-3.5 px-3 rounded-xl flex items-center justify-between group relative overflow-hidden focus:outline-none"
                                :class="currentReceipt[item] ? 'bg-indigo-50/80 border-indigo-200 text-indigo-900 shadow-sm' : 'bg-white border-slate-200 text-slate-700 hover:border-indigo-300'">
                            
                            <span class="text-[13px] font-semibold truncate pr-1 z-10" x-text="item"></span>
                            
                            <!-- Badge Angka di Tombol -->
                            <span class="text-[11px] px-2 py-0.5 rounded-md font-bold transition-all z-10 flex items-center justify-center min-w-[24px]"
                                  :class="currentReceipt[item] ? 'bg-indigo-600 text-white shadow-sm' : 'text-slate-300 bg-slate-50'">
                                <template x-if="currentReceipt[item]">
                                    <span x-text="'+' + currentReceipt[item]"></span>
                                </template>
                                <template x-if="!currentReceipt[item]">
                                    <i data-lucide="plus" class="w-3 h-3"></i>
                                </template>
                            </span>
                        </button>
                    </template>
                </div>
            </section>

            <!-- Area Review Struk (Kertas Kuning) -->
            <section class="bg-amber-50/40 p-4 rounded-2xl border border-dashed border-amber-200/80 relative overflow-hidden shadow-sm mt-auto">
                <div class="absolute top-0 left-0 right-0 h-1 bg-gradient-to-r from-amber-200 via-amber-300 to-amber-200 opacity-40"></div>
                
                <div class="flex justify-between items-center mb-4 border-b border-amber-100/50 pb-3">
                    <h2 class="text-xs font-bold text-amber-900/80 flex items-center gap-1.5 tracking-wide uppercase">
                        <i data-lucide="receipt" class="w-4 h-4"></i> Isi Struk Ini
                    </h2>
                    <button x-show="Object.keys(currentReceipt).length > 0" 
                            @click="clearCurrentReceipt()" 
                            class="text-red-600 text-[10px] font-bold bg-white px-2.5 py-1 rounded-lg border border-red-100 shadow-sm active:bg-red-50 transition-colors flex items-center gap-1">
                        <i data-lucide="trash-2" class="w-3 h-3"></i> BATAL
                    </button>
                </div>

                <!-- State Kosong -->
                <div x-show="Object.keys(currentReceipt).length === 0" class="py-8 text-center flex flex-col items-center justify-center">
                    <div class="w-12 h-12 bg-white rounded-full flex items-center justify-center mb-2 border border-amber-100 shadow-sm">
                        <i data-lucide="shopping-cart" class="w-5 h-5 text-amber-300"></i>
                    </div>
                    <p class="text-xs font-medium text-amber-700/60">Belum ada menu yang diklik.</p>
                </div>

                <!-- State Ada Isi -->
                <div x-show="Object.keys(currentReceipt).length > 0" class="space-y-3" style="display: none;">
                    <ul class="space-y-2 max-h-[25vh] overflow-y-auto pr-1">
                        <template x-for="(qty, item) in currentReceipt" :key="item">
                            <li class="flex justify-between items-center bg-white p-2 rounded-xl border border-amber-100 shadow-sm animate-slide-up">
                                <span class="font-semibold text-slate-800 text-[13px] pl-1" x-text="item"></span>
                                <div class="flex items-center gap-2 bg-slate-50 p-1 rounded-lg border border-slate-100">
                                    <button @click="updateCurrentQuantity(item, -1)" class="bg-white text-slate-600 w-7 h-7 rounded shadow-sm flex items-center justify-center active:scale-95">
                                        <i data-lucide="minus" class="w-3 h-3"></i>
                                    </button>
                                    <span class="font-bold text-sm w-6 text-center text-indigo-700" x-text="qty"></span>
                                    <button @click="updateCurrentQuantity(item, 1)" class="bg-white text-indigo-600 w-7 h-7 rounded shadow-sm flex items-center justify-center active:scale-95">
                                        <i data-lucide="plus" class="w-3 h-3"></i>
                                    </button>
                                </div>
                            </li>
                        </template>
                    </ul>
                    
                    <button @click="saveReceipt()" class="w-full bg-indigo-600 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-indigo-200 flex items-center justify-center gap-2 text-sm active:scale-[0.98] transition-all mt-4">
                        <i data-lucide="save" class="w-4 h-4"></i>
                        SIMPAN STRUK (<span x-text="getTotalItemsInCurrent()"></span> Item)
                    </button>
                </div>
            </section>
        </main>

        <!-- === TAB 2: REKAP AKHIR === -->
        <main x-show="activeTab === 'rekap'" class="flex-1 flex flex-col p-4 pb-24 overflow-y-auto animate-fade-in bg-slate-50/50" style="display: none;">
            
            <section class="bg-white p-4 rounded-2xl border border-slate-200/60 shadow-sm flex-grow flex flex-col mb-4">
                <h2 class="text-xs font-bold mb-4 text-slate-800 flex items-center gap-2 border-b border-slate-100 pb-3 uppercase tracking-wider">
                    <i data-lucide="clipboard-list" class="w-4 h-4 text-indigo-600"></i> Hasil Rekapan Porsi
                </h2>
                
                <!-- State Kosong Rekap -->
                <div x-show="Object.keys(grandTotal).length === 0" class="flex-grow flex flex-col items-center justify-center py-10 text-slate-400">
                    <div class="bg-slate-50 p-4 rounded-full mb-3 border border-slate-100">
                        <i data-lucide="folder-open" class="w-8 h-8 opacity-50"></i>
                    </div>
                    <p class="text-xs font-medium">Belum ada struk tersimpan</p>
                </div>

                <!-- Daftar Rekap -->
                <div x-show="Object.keys(grandTotal).length > 0" class="flex-grow overflow-y-auto" style="display: none;">
                    <ul class="space-y-1">
                        <template x-for="item in menuItems" :key="item">
                            <li x-show="grandTotal[item]" class="flex justify-between items-center py-2.5 border-b border-slate-50 last:border-0 px-1">
                                <div class="flex items-center gap-2">
                                    <div class="w-1.5 h-1.5 rounded-full bg-indigo-300"></div>
                                    <span class="text-slate-700 text-[13px] font-medium" x-text="item"></span>
                                </div>
                                <span class="font-bold text-[13px] text-indigo-700 bg-indigo-50 border border-indigo-100/50 px-3 py-1 rounded-lg shadow-sm" x-text="grandTotal[item]"></span>
                            </li>
                        </template>
                    </ul>
                </div>
            </section>

            <!-- Aksi Bawah -->
            <section class="space-y-3 shrink-0">
                <button @click="handleCopy()" class="w-full py-3.5 rounded-xl font-bold flex items-center justify-center gap-2 text-sm transition-all active:scale-[0.98] text-white shadow-lg"
                        :class="copied ? 'bg-emerald-500 shadow-emerald-200/50' : 'bg-slate-900 shadow-slate-300/50'">
                    <i :data-lucide="copied ? 'check-circle-2' : 'copy'" class="w-4 h-4"></i>
                    <span x-text="copied ? 'Berhasil Disalin!' : 'Salin Laporan WhatsApp'"></span>
                </button>
                
                <button @click="showResetModal = true" class="w-full py-3.5 text-red-600 bg-white hover:bg-red-50 active:bg-red-100 rounded-xl font-bold text-xs flex items-center justify-center gap-1.5 transition-colors border border-red-200 shadow-sm">
                    <i data-lucide="rotate-ccw" class="w-4 h-4"></i> Tutup Shift & Reset
                </button>
            </section>
        </main>

        <!-- === BOTTOM NAVIGATION BAR === -->
        <nav class="absolute bottom-0 left-0 right-0 bg-white/90 backdrop-blur-xl border-t border-slate-200/60 shadow-[0_-10px_20px_-10px_rgba(0,0,0,0.05)] z-40 pb-safe">
            <div class="flex h-16 max-w-md mx-auto">
                <button @click="activeTab = 'input'" class="flex-1 flex flex-col items-center justify-center gap-1 transition-colors relative"
                        :class="activeTab === 'input' ? 'text-indigo-600' : 'text-slate-400'">
                    <div class="absolute top-0 w-8 h-1 bg-indigo-600 rounded-b-full transition-opacity duration-300" x-show="activeTab === 'input'" style="display: none;"></div>
                    <i data-lucide="file-text" class="w-5 h-5 mb-0.5"></i>
                    <span class="text-[10px] tracking-wide font-bold uppercase">Input Struk</span>
                </button>
                <button @click="activeTab = 'rekap'" class="flex-1 flex flex-col items-center justify-center gap-1 transition-colors relative"
                        :class="activeTab === 'rekap' ? 'text-indigo-600' : 'text-slate-400'">
                    <div class="absolute top-0 w-8 h-1 bg-indigo-600 rounded-b-full transition-opacity duration-300" x-show="activeTab === 'rekap'" style="display: none;"></div>
                    <i data-lucide="clipboard-list" class="w-5 h-5 mb-0.5"></i>
                    <span class="text-[10px] tracking-wide font-bold uppercase">Rekap Akhir</span>
                </button>
            </div>
        </nav>

        <!-- === MODAL RESET === -->
        <div x-show="showResetModal" class="fixed inset-0 z-50 flex items-center justify-center px-4" style="display: none;">
            <!-- Background Overlay -->
            <div x-show="showResetModal" 
                 x-transition:enter="transition opacity ease-out duration-200"
                 x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100"
                 x-transition:leave="transition opacity ease-in duration-200"
                 x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0"
                 class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" @click="showResetModal = false"></div>
            
            <!-- Modal Box -->
            <div x-show="showResetModal"
                 x-transition:enter="transition ease-out duration-200 transform"
                 x-transition:enter-start="opacity-0 scale-95" x-transition:enter-end="opacity-100 scale-100"
                 x-transition:leave="transition ease-in duration-200 transform"
                 x-transition:leave-start="opacity-100 scale-100" x-transition:leave-end="opacity-0 scale-95"
                 class="relative bg-white rounded-3xl p-6 w-full max-w-[320px] shadow-2xl border border-slate-100">
                
                <div class="w-14 h-14 rounded-full bg-red-50 text-red-500 flex items-center justify-center mb-4 mx-auto border-4 border-white shadow-sm">
                    <i data-lucide="alert-triangle" class="w-6 h-6"></i>
                </div>
                <h3 class="text-lg font-bold text-slate-900 mb-2 text-center">Tutup Shift Sekarang?</h3>
                <p class="text-slate-500 text-sm text-center mb-6 leading-relaxed px-1">
                    Semua rekapan porsi dan jumlah struk akan direset jadi 0. Pastikan laporan sudah dikirim ke bos!
                </p>
                <div class="flex flex-col gap-2.5">
                    <button @click="confirmReset()" class="w-full py-3.5 bg-red-600 active:bg-red-700 text-white rounded-xl font-bold text-sm shadow-md shadow-red-200 transition-colors">
                        Ya, Reset Semua
                    </button>
                    <button @click="showResetModal = false" class="w-full py-3.5 bg-slate-100 active:bg-slate-200 text-slate-700 rounded-xl font-bold text-sm transition-colors">
                        Batal
                    </button>
                </div>
            </div>
        </div>

    </div>

    <!-- Application Logic -->
    <script>
        function kasirApp() {
            return {
                menuItems: [
                    "Kuning DADA", "Kuning PAHA", "Kalasan DADA", "Kalasan PAHA",
                    "Lele", "Gurame", "Nila", "Sate Ayam", "Sate Kambing",
                    "Iga Bakar", "Bumbu Bakaran", "Kecap Koki", "Bandeng", "Bebek"
                ],
                activeTab: 'input',
                currentReceipt: JSON.parse(localStorage.getItem('resto_currentReceipt')) || {},
                grandTotal: JSON.parse(localStorage.getItem('resto_grandTotal')) || {},
                receiptCount: JSON.parse(localStorage.getItem('resto_receiptCount')) || 0,
                showResetModal: false,
                copied: false,
                toast: { show: false, message: '', type: 'success' },

                // Watcher: Save to LocalStorage automatically
                init() {
                    this.$watch('currentReceipt', val => localStorage.setItem('resto_currentReceipt', JSON.stringify(val)));
                    this.$watch('grandTotal', val => localStorage.setItem('resto_grandTotal', JSON.stringify(val)));
                    this.$watch('receiptCount', val => localStorage.setItem('resto_receiptCount', JSON.stringify(val)));
                    
                    // Render icons initially and after tab change
                    lucide.createIcons();
                    this.$watch('activeTab', () => {
                        setTimeout(() => lucide.createIcons(), 50);
                    });
                },

                showNotification(message, type = 'success') {
                    this.toast.message = message;
                    this.toast.type = type;
                    this.toast.show = true;
                    setTimeout(() => { this.toast.show = false; }, 2500);
                    setTimeout(() => lucide.createIcons(), 50); // Re-render icon in toast
                },

                addToCurrent(item) {
                    if (!this.currentReceipt[item]) {
                        this.currentReceipt[item] = 1;
                    } else {
                        this.currentReceipt[item]++;
                    }
                    // Trigger Alpine reactivity
                    this.currentReceipt = { ...this.currentReceipt };
                },

                updateCurrentQuantity(item, delta) {
                    let newQty = (this.currentReceipt[item] || 0) + delta;
                    if (newQty <= 0) {
                        delete this.currentReceipt[item];
                    } else {
                        this.currentReceipt[item] = newQty;
                    }
                    this.currentReceipt = { ...this.currentReceipt };
                },

                getTotalItemsInCurrent() {
                    return Object.values(this.currentReceipt).reduce((a, b) => a + b, 0);
                },

                clearCurrentReceipt() {
                    this.currentReceipt = {};
                    this.showNotification('Input struk dikosongkan', 'error');
                },

                saveReceipt() {
                    if (Object.keys(this.currentReceipt).length === 0) return;

                    // Merge currentReceipt to grandTotal
                    for (const [item, qty] of Object.entries(this.currentReceipt)) {
                        this.grandTotal[item] = (this.grandTotal[item] || 0) + qty;
                    }
                    
                    this.receiptCount++;
                    this.currentReceipt = {}; // Reset for next receipt
                    
                    // Trigger reactivity
                    this.grandTotal = { ...this.grandTotal };
                    this.showNotification('Struk berhasil disimpan!');
                },

                async handleCopy() {
                    if (Object.keys(this.grandTotal).length === 0) {
                        this.showNotification('Belum ada data untuk disalin', 'error');
                        return;
                    }

                    let textToCopy = `*📊 Laporan Penjualan*\n`;
                    textToCopy += `Total Struk: ${this.receiptCount}\n`;
                    textToCopy += `------------------------\n`;
                    
                    let totalPorsi = 0;
                    this.menuItems.forEach(item => {
                        if (this.grandTotal[item]) {
                            textToCopy += `▪ ${item}: ${this.grandTotal[item]}\n`;
                            totalPorsi += this.grandTotal[item];
                        }
                    });
                    
                    textToCopy += `------------------------\n`;
                    textToCopy += `Total Porsi: ${totalPorsi}`;

                    try {
                        await navigator.clipboard.writeText(textToCopy);
                        this.triggerCopiedSuccess();
                    } catch (err) {
                        // Fallback for older browsers
                        const textArea = document.createElement("textarea");
                        textArea.value = textToCopy;
                        textArea.style.position = "fixed";
                        document.body.appendChild(textArea);
                        textArea.select();
                        try {
                            document.execCommand('copy');
                            this.triggerCopiedSuccess();
                        } catch (e) {
                            this.showNotification('Gagal menyalin teks', 'error');
                        }
                        document.body.removeChild(textArea);
                    }
                },

                triggerCopiedSuccess() {
                    this.copied = true;
                    this.showNotification('Laporan disalin ke Papan Klip!');
                    setTimeout(() => {
                        this.copied = false;
                        lucide.createIcons();
                    }, 2000);
                    setTimeout(() => lucide.createIcons(), 50);
                },

                confirmReset() {
                    this.currentReceipt = {};
                    this.grandTotal = {};
                    this.receiptCount = 0;
                    this.showResetModal = false;
                    this.activeTab = 'input';
                    this.showNotification('Data shift berhasil direset');
                }
            }
        }
    </script>
</body>
</html>
